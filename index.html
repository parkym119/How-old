<button onclick="switchContent('bmi-calc')" class="w-full text-left p-2 rounded hover:bg-blue-50 hover:text-blue-600 flex items-center gap-2 text-gray-600">
    <i class="fa-solid fa-weight-scale text-gray-400"></i> 비만도(BMI) 계산기
</button>
<div id="content-bmi-calc" class="content-page hidden bg-white p-8 rounded-xl border border-gray-200 shadow-xs">
    <h2 class="text-xl font-bold mb-4 border-b pb-2 flex items-center gap-2">
        <i class="fa-solid fa-weight-scale text-blue-600"></i> 비만도(BMI) 계산기
    </h2>
    <p class="text-gray-600 mb-6 text-sm">키와 몸무게를 입력하시면 BMI 지수를 알려드립니다.</p>
    <div class="space-y-4 max-w-sm">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">키 (cm)</label>
            <input type="number" id="heightInput" placeholder="예: 175" class="w-full p-2 border border-gray-300 rounded-md focus:outline-hidden focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">몸무게 (kg)</label>
            <input type="number" id="weightInput" placeholder="예: 70" class="w-full p-2 border border-gray-300 rounded-md focus:outline-hidden focus:ring-2 focus:ring-blue-500">
        </div>
        <button onclick="calculateBMI()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium p-2 rounded-md transition">결과 보기</button>
        <div id="bmiResult" class="mt-4 p-4 bg-gray-50 rounded-md font-semibold text-blue-700 text-center hidden"></div>
    </div>
</div>
